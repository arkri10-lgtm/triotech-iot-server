services:
  emqx:
    image: emqx/emqx:latest
    container_name: triotech-emqx
    restart: unless-stopped
    environment:
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE: /opt/emqx/etc/certs/mqtt/fullchain.pem
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE: /opt/emqx/etc/certs/mqtt/privkey.pem
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__VERIFY: verify_none
      EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__FAIL_IF_NO_PEER_CERT: "false"
    ports:
      - "1883:1883"
      - "8883:8883"
      - "127.0.0.1:18083:18083"
      - "8083:8083"
      - "8084:8084"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ./certs/mqtt:/opt/emqx/etc/certs/mqtt:ro
  backend:
    image: node:22-alpine
    container_name: triotech-backend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      MQTT_URL: mqtt://emqx:1883
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      API_TOKEN: ${API_TOKEN}
      DEVICE_API_TOKEN: ${DEVICE_API_TOKEN}
      DATABASE_URL: postgres://triotech_admin:${POSTGRES_PASSWORD}@postgres:5432/triotech
      DEVICE_OFFLINE_GRACE_MS: ${DEVICE_OFFLINE_GRACE_MS:-120000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      DEFAULT_CUSTOMER_ID: ${DEFAULT_CUSTOMER_ID:-customer-1}
      DEFAULT_CUSTOMER_NAME: ${DEFAULT_CUSTOMER_NAME:-Customer 1}
      ALERT_EMAIL_ENABLED: ${ALERT_EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - emqx
      - postgres
  postgres:
    image: postgres:16
    container_name: triotech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: triotech
      POSTGRES_USER: triotech_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  emqx_data:
  emqx_log:
  postgres_data:
